<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videollamada WebRTC + MQTT</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        video { background-color: #1a1a1a; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col items-center justify-center min-h-screen p-4">

    <div id="panel-conexion" class="bg-gray-800 p-6 rounded-lg shadow-lg w-full max-w-md text-center">
        <h2 class="text-2xl font-bold mb-4">Videollamada P2P</h2>
        
        <div class="mb-4 text-left">
            <label class="block text-sm text-gray-400 mb-1">Tu Nombre de Usuario:</label>
            <input type="text" id="mi-usuario-input" placeholder="Ej: carlos" class="w-full p-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-blue-500">
            <button onclick="conectarMQTT()" id="btn-conectar" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 p-2 rounded font-semibold transition">Conectarse a la Red</button>
        </div>

        <div id="seccion-marcar" class="hidden border-t border-gray-700 pt-4 text-left">
            <label class="block text-sm text-gray-400 mb-1">Llamar a (Usuario Destino):</label>
            <input type="text" id="usuario-destino-input" placeholder="Ej: ana" class="w-full p-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-blue-500">
            <button onclick="prepararLlamada()" class="w-full mt-2 bg-green-600 hover:bg-green-700 p-2 rounded font-semibold transition">Iniciar Videollamada</button>
        </div>
        <p id="estado-conexion" class="text-sm text-yellow-400 mt-3">Desconectado</p>
    </div>

    <div id="modal-llamada-entrante" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-lg max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-2">¡Llamada Entrante!</h3>
            <p id="txt-llamada-entrante" class="text-gray-300 mb-6">Alguien te está llamando...</p>
            <div class="flex space-x-4 justify-center">
                <button onclick="aceptarLlamadaEntrante()" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-full font-bold">Aceptar</button>
                <button onclick="rechazarLlamadaEntrante()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-full font-bold">Rechazar</button>
            </div>
        </div>
    </div>

    <div id="modal-video" class="hidden fixed inset-0 bg-gray-950 flex flex-col z-40">
        <div class="bg-gray-900/80 p-4 text-center border-b border-gray-800 absolute top-0 left-0 w-full z-10">
            <p id="estado-llamada" class="text-lg font-semibold text-green-400">Conectando...</p>
        </div>

        <div class="flex-1 flex flex-col md:flex-row relative pt-16 pb-24">
            <div class="flex-1 h-full w-full flex items-center justify-center relative">
                <video id="video-remoto" autoplay playsinline class="w-full h-full object-cover"></video>
                <span class="absolute bottom-4 left-4 bg-black/60 px-3 py-1 rounded text-sm">Compañero</span>
            </div>
            
            <div class="absolute bottom-28 right-4 w-32 h-44 md:w-48 md:h-64 rounded-lg overflow-hidden border-2 border-blue-500 shadow-xl z-20">
                <video id="video-local" autoplay playsinline muted class="w-full h-full object-cover"></video>
                <span class="absolute bottom-2 left-2 bg-black/60 px-2 py-0.5 text-xs rounded">Tú</span>
            </div>
        </div>

        <div class="bg-gray-950 p-6 flex justify-center items-center absolute bottom-0 left-0 w-full">
            <button onclick="terminarLlamadaLocal(true)" class="bg-red-600 hover:bg-red-700 text-white p-4 rounded-full shadow-lg transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z" />
                </svg> Colgar Llamada
            </button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN GLOBAL ---
        let miUsuario = "";
        let chatActivo = ""; // El usuario al que queremos marcar
        let usuarioLlamadaActual = "";
        let enLlamada = false;
        
        let clientMQTT = null;
        let localStream = null;
        let peerConnection = null;
        let ofertaRecibidaTemporal = null;

        // Servidores STUN públicos de Google para WebRTC
        const configWebRTC = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // --- 1. PASO: CONECTAR A MQTT ---
        function conectarMQTT() {
            miUsuario = document.getElementById("mi-usuario-input").value.trim().toLowerCase();
            if (!miUsuario) return alert("Por favor escribe tu usuario.");

            document.getElementById("estado-conexion").textContent = "Conectando al broker MQTT...";
            
            // Usamos un broker público gratuito de HiveMQ sobre WebSockets seguros
            clientMQTT = mqtt.connect("wss://broker.hivemq.com:8000/mqtt");

            clientMQTT.on("connect", () => {
                document.getElementById("estado-conexion").textContent = `Conectado como: @${miUsuario}`;
                document.getElementById("estado-conexion").className = "text-sm text-green-400 mt-3";
                document.getElementById("mi-usuario-input").disabled = true;
                document.getElementById("btn-conectar").classList.add("hidden");
                document.getElementById("seccion-marcar").classList.remove("hidden");

                // Nos suscribimos a nuestro propio canal para recibir llamadas de otros
                clientMQTT.subscribe(`videochat/usuario/${miUsuario}`, (err) => {
                    if (err) console.error("Error al suscribirse", err);
                });
            });

            // --- ESCUCHAR SEÑALES ENTRANTE (Signaling) ---
            clientMQTT.on("message", (topic, message) => {
                const data = JSON.parse(message.toString());
                
                if (data.tipo === "call_offer") {
                    if (enLlamada) {
                        // Si estamos ocupados, rechazamos automáticamente
                        enviarSignaling(data.remitente, "call_rejected", {});
                        return;
                    }
                    usuarioLlamadaActual = data.remitente;
                    ofertaRecibidaTemporal = data.detalle;
                    document.getElementById("txt-llamada-entrante").textContent = `@${data.remitente} te está llamando...`;
                    document.getElementById("modal-llamada-entrante").classList.remove("hidden");
                } 
                else if (data.tipo === "call_answer" && peerConnection) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(data.detalle));
                } 
                else if (data.tipo === "ice_candidate" && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data.detalle)).catch(e => console.error(e));
                } 
                else if (data.tipo === "call_rejected") {
                    alert("El usuario rechazó la llamada o está ocupado.");
                    terminarLlamadaLocal(false);
                }
                else if (data.tipo === "hangup") {
                    terminarLlamadaLocal(false);
                }
            });
        }

        // Función auxiliar para enviar datos JSON por MQTT
        function enviarSignaling(destinatario, tipo, detalle) {
            const payload = { remitente: miUsuario, tipo: tipo, detalle: detalle };
            clientMQTT.publish(`videochat/usuario/${destinatario}`, JSON.stringify(payload));
        }

        // --- 2. PASO: MARCAR A UN COMPAÑERO ---
        function prepararLlamada() {
            chatActivo = document.getElementById("usuario-destino-input").value.trim().toLowerCase();
            if (!chatActivo) return alert("Escribe el nombre de tu compañero.");
            if (chatActivo === miUsuario) return alert("No puedes llamarte a ti mismo.");
            
            iniciarVideollamada();
        }

        // --- 3. PASO: PROCESO WEBRTC (CON FIX DE PLAY() INTEGRADO) ---
        function iniciarVideollamada() {
            if (enLlamada) return;
            usuarioLlamadaActual = chatActivo;
            enLlamada = true;
            
            document.getElementById("modal-video").classList.remove("hidden");
            document.getElementById("estado-llamada").textContent = "Llamando a @" + usuarioLlamadaActual + "...";
            
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById("video-local").srcObject = stream;
                
                peerConnection = new RTCPeerConnection(configWebRTC);
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));
                
                peerConnection.onicecandidate = e => {
                    if (e.candidate) enviarSignaling(usuarioLlamadaActual, "ice_candidate", e.candidate);
                };
                
                // ⚠️ SOLUCIÓN: Forzar reproducción del video remoto al llegar
                peerConnection.ontrack = e => {
                    const videoRemoto = document.getElementById("video-remoto");
                    if (videoRemoto.srcObject !== e.streams[0]) {
                        videoRemoto.srcObject = e.streams[0];
                        videoRemoto.play().catch(err => console.log("Reintento de reproducción:", err));
                    }
                    document.getElementById("estado-llamada").textContent = "En llamada";
                };
                
                return peerConnection.createOffer();
            })
            .then(offer => peerConnection.setLocalDescription(offer))
            .then(() => enviarSignaling(usuarioLlamadaActual, "call_offer", peerConnection.localDescription))
            .catch(err => {
                console.error(err);
                alert("Error: Asegúrate de dar permisos de cámara/micrófono y usar HTTPS.");
                terminarLlamadaLocal(true);
            });
        }

        // --- 4. PASO: RESPONDER LLAMADA ENTRANTE ---
        function aceptarLlamadaEntrante() {
            document.getElementById("modal-llamada-entrante").classList.add("hidden");
            if (!usuarioLlamadaActual || !ofertaRecibidaTemporal) return;
            
            enLlamada = true;
            document.getElementById("modal-video").classList.remove("hidden");
            document.getElementById("estado-llamada").textContent = "Conectando audio y video...";
            
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById("video-local").srcObject = stream;
                
                peerConnection = new RTCPeerConnection(configWebRTC);
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));
                
                peerConnection.onicecandidate = e => {
                    if (e.candidate) enviarSignaling(usuarioLlamadaActual, "ice_candidate", e.candidate);
                };
                
                // ⚠️ SOLUCIÓN: Forzar reproducción del video remoto al llegar
                peerConnection.ontrack = e => {
                    const videoRemoto = document.getElementById("video-remoto");
                    if (videoRemoto.srcObject !== e.streams[0]) {
                        videoRemoto.srcObject = e.streams[0];
                        videoRemoto.play().catch(err => console.log("Reintento de reproducción:", err));
                    }
                    document.getElementById("estado-llamada").textContent = "En llamada";
                };
                
                return peerConnection.setRemoteDescription(new RTCSessionDescription(ofertaRecibidaTemporal));
            })
            .then(() => peerConnection.createAnswer())
            .then(answer => peerConnection.setLocalDescription(answer))
            .then(() => {
                enviarSignaling(usuarioLlamadaActual, "call_answer", peerConnection.localDescription);
                ofertaRecibidaTemporal = null;
            })
            .catch(err => {
                console.error(err);
                alert("Error al conectar la llamada.");
                terminarLlamadaLocal(true);
            });
        }

        function rechazarLlamadaEntrante() {
            document.getElementById("modal-llamada-entrante").classList.add("hidden");
            if (usuarioLlamadaActual) {
                enviarSignaling(usuarioLlamadaActual, "call_rejected", {});
            }
            usuarioLlamadaActual = "";
            ofertaRecibidaTemporal = null;
        }

        // --- 5. PASO: FINALIZAR/COLGAR ---
        function terminarLlamadaLocal(notificarCompanero) {
            if (notificarCompanero && usuarioLlamadaActual) {
                enviarSignaling(usuarioLlamadaActual, "hangup", {});
            }

            enLlamada = false;
            document.getElementById("modal-video").classList.add("hidden");
            
            // Apagar cámara y micrófono locales
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Cerrar conexión WebRTC
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            // Limpiar fuentes de video
            document.getElementById("video-local").srcObject = null;
            document.getElementById("video-remoto").srcObject = null;
            usuarioLlamadaActual = "";
        }
    </script>
</body>
</html>
