<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasaPedro P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería PeerJS: Conecta dispositivos directamente sin bases de datos bloqueadas -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4 bg-[#0b141a] text-[#e9edef] font-family: sans-serif;">

    <!-- 1. PANTALLA DE BIENVENIDA -->
    <div id="pantalla-registro" class="bg-[#111b21] p-8 rounded-2xl shadow-2xl border border-[#222e35] max-w-sm w-full text-center">
        <h1 class="text-3xl font-extrabold text-[#00a884] mb-2">WasaPedro</h1>
        <p class="text-gray-400 text-sm mb-6">Ingresa tu nombre para generar tu ID de red.</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre..." class="w-full bg-[#2a3942] border-none text-white rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-[#00a884]">
        <button id="btn-guardar" class="w-full bg-[#00a884] hover:bg-[#008f72] text-[#111b21] font-bold p-3 rounded-lg transition">Ingresar a WasaPedro</button>
    </div>

    <!-- 2. INTERFAZ PRINCIPAL -->
    <div id="interfaz-principal" class="w-full max-w-4xl h-[85vh] bg-[#111b21] rounded-2xl shadow-2xl border border-[#222e35] flex overflow-hidden hidden">
        
        <!-- BARRA LATERAL -->
        <div class="w-1/3 border-r border-[#222e35] flex flex-col bg-[#111b21]">
            <div class="p-4 bg-[#202d33] flex flex-col gap-1">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#00a884] text-[#111b21] font-bold rounded-full flex items-center justify-center text-lg" id="avatar-usuario">?</div>
                    <span id="nombre-usuario-pantalla" class="font-medium text-sm">...</span>
                </div>
                <!-- ID que le debes pasar a tu amigo -->
                <div class="text-[11px] text-gray-400 mt-2 bg-[#111b21] p-2 rounded border border-[#222e35]">
                    Mi ID de conexión: <span id="mi-id-display" class="font-mono text-[#00a884] select-all font-bold">Cargando...</span>
                </div>
            </div>

            <!-- Buscador por ID -->
            <div class="p-3 bg-[#111b21] border-b border-[#222e35]">
                <div class="flex flex-col gap-2 bg-[#202d33] rounded-lg p-2">
                    <input type="text" id="input-buscar" placeholder="Pegar ID de tu amigo..." class="bg-transparent text-xs w-full focus:outline-none text-white placeholder-gray-400">
                    <button id="btn-buscar" class="bg-[#00a884] text-[#111b21] text-xs font-bold py-1 px-2 rounded w-full">Conectar con Amigo</button>
                </div>
            </div>

            <!-- Buzón de Estado -->
            <div class="p-4 border-b border-[#222e35] bg-[#182229]">
                <h2 class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-2">Buzón de Conexión</h2>
                <div id="lista-solicitudes" class="space-y-2 text-xs text-gray-400">
                    <p id="estado-red" class="italic text-[#00a884]">Esperando que te conectes...</p>
                </div>
            </div>

            <!-- Lista de Amigos Conectados -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="lista-amigos">
                <h2 class="text-xs font-bold tracking-wider text-gray-400 uppercase p-2">Chats Activos</h2>
                <div id="amigo-item" class="hidden flex items-center gap-3 p-3 rounded-lg cursor-pointer bg-[#2a3942]">
                    <div class="w-10 h-10 bg-gray-600 text-white font-bold rounded-full flex items-center justify-center text-sm" id="avatar-lista-amigo">-</div>
                    <div class="text-sm font-medium flex-1" id="nombre-lista-amigo">Amigo</div>
                </div>
            </div>
        </div>

        <!-- VENTANA DE CHAT -->
        <div class="flex-1 flex flex-col bg-[#222e35] bg-opacity-20" id="pantalla-chat-vacia">
            <div class="m-auto text-center max-w-sm">
                <h3 class="text-xl font-semibold text-gray-300">WasaPedro Directo</h3>
                <p class="text-sm text-gray-500 mt-2">Pásale tu "ID de conexión" a tu amigo o pega el de él para abrir el canal directo.</p>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#0b141a] hidden" id="pantalla-chat-activa">
            <div class="p-4 bg-[#202d33] flex items-center gap-3 border-b border-[#222e35]">
                <div class="w-9 h-9 bg-[#00a884] text-black font-bold rounded-full flex items-center justify-center text-sm" id="avatar-chat">?</div>
                <span id="nombre-chat-amigo" class="font-medium text-sm">...</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="contenedor-mensajes"></div>
            <div class="p-4 bg-[#202d33] flex gap-3 items-center">
                <input type="text" id="input-mensaje" placeholder="Escribe un mensaje..." class="flex-1 bg-[#2a3942] rounded-lg p-3 text-sm text-white focus:outline-none">
                <button id="btn-enviar" class="bg-[#00a884] text-[#111b21] font-bold px-5 py-3 rounded-lg text-sm hover:bg-[#008f72]">Enviar</button>
            </div>
        </div>

    </div>

    <script>
        let miNombre = localStorage.getItem("wasapedro_p2p_name");
        let peer = null;
        let conexionActiva = null;
        let nombreAmigoConectado = "";

        if (miNombre) {
            document.getElementById("input-nombre").value = miNombre;
        }

        document.getElementById("btn-guardar").addEventListener("click", () => {
            const nombre = document.getElementById("input-nombre").value.trim();
            if (nombre.length < 2) return alert("Nombre muy corto.");
            
            miNombre = nombre;
            localStorage.setItem("wasapedro_p2p_name", miNombre);
            
            document.getElementById("pantalla-registro").classList.add("hidden");
            document.getElementById("interfaz-principal").classList.remove("hidden");
            
            document.getElementById("nombre-usuario-pantalla").textContent = miNombre;
            document.getElementById("avatar-usuario").textContent = miNombre.charAt(0).toUpperCase();
            
            inicializarP2P();
        });

        // --- CONFIGURACIÓN DE RED P2P (DIRECTA ENTRE NAVEGADORES) ---
        function inicializarP2P() {
            // Creamos un ID aleatorio combinando su nombre
            const idGenerado = miNombre.replace(/\s+/g, '') + "-" + Math.floor(1000 + Math.random() * 9000);
            
            peer = new Peer(idGenerado);

            peer.on('open', (id) => {
                document.getElementById("mi-id-display").textContent = id;
                document.getElementById("estado-red").textContent = "Listo. Esperando conexión...";
            });

            // Escuchar si alguien se conecta a nosotros
            peer.on('connection', (conn) => {
                conexionActiva = conn;
                document.getElementById("estado-red").textContent = "¡Amigo conectado con éxito!";
                configurarCanalChat();
            });
        }

        // --- CONECTARSE A UN AMIGO ---
        document.getElementById("btn-buscar").addEventListener("click", () => {
            const idDestino = document.getElementById("input-buscar").value.trim();
            if (!idDestino) return alert("Por favor pega el ID de tu amigo.");
            
            document.getElementById("estado-red").textContent = "Intentando conectar...";
            conexionActiva = peer.connect(idDestino);
            
            conexionActiva.on('open', () => {
                document.getElementById("estado-red").textContent = "¡Te has conectado con tu amigo!";
                configurarCanalChat();
            });
        });

        // --- CONFIGURACIÓN DE LA VENTANA DE CHAT ---
        function configurarCanalChat() {
            // Intercambiar nombres automáticamente al conectar
            setTimeout(() => {
                conexionActiva.send({ tipo: 'nombre', valor: miNombre });
            }, 500);

            conexionActiva.on('data', (data) => {
                if (data.tipo === 'nombre') {
                    nombreAmigoConectado = data.valor;
                    mostrarAmigoEnLista();
                }
                if (data.tipo === 'texto') {
                    recibirMensaje(data.valor);
                }
            });
        }

        function mostrarAmigoEnLista() {
            document.getElementById("amigo-item").classList.remove("hidden");
            document.getElementById("nombre-lista-amigo").textContent = nombreAmigoConectado;
            document.getElementById("avatar-lista-amigo").textContent = nombreAmigoConectado.charAt(0).toUpperCase();
            
            // Activar el área de chat automáticamente
            document.getElementById("amigo-item").onclick = () => {
                document.getElementById("pantalla-chat-vacia").classList.add("hidden");
                document.getElementById("pantalla-chat-activa").classList.remove("hidden");
                document.getElementById("nombre-chat-amigo").textContent = nombreAmigoConectado;
                document.getElementById("avatar-chat").textContent = nombreAmigoConectado.charAt(0).toUpperCase();
            };
            document.getElementById("amigo-item").click(); // Abre el chat automáticamente
        }

        // --- SISTEMA DE MENSAJES ---
        function enviarMensaje() {
            const input = document.getElementById("input-mensaje");
            const texto = input.value.trim();
            if (!texto || !conexionActiva) return;

            // Enviar por el aire al amigo
            conexionActiva.send({ tipo: 'texto', valor: texto });

            // Pintar en nuestra pantalla
            dibujarBurbuja(texto, true);
            input.value = "";
        }

        function recibirMensaje(texto) {
            dibujarBurbuja(texto, false);
        }

        function dibujarBurbuja(texto, soyYo) {
            const contenedor = document.getElementById("contenedor-mensajes");
            const div = document.createElement("div");
            div.className = `flex ${soyYo ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-xs rounded-xl p-3 text-sm text-white shadow ${soyYo ? 'bg-[#005c4b]' : 'bg-[#202d33]'}">${texto}</div>`;
            contenedor.appendChild(div);
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        document.getElementById("btn-enviar").addEventListener("click", enviarMensaje);
        document.getElementById("input-mensaje").addEventListener("keydown", (e) => { if(e.key === "Enter") enviarMensaje(); });
    </script>
</body>
</html>
